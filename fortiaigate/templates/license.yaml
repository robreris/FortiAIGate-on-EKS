{{- if not .Values.license.existingConfigMap }}
{{- $inline := .Values.license.data | default dict -}}
{{- $fileMap := .Values.license.files | default dict -}}
{{- $legacy := .Values.global.licenses | default dict -}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "fortiaigate.licenseConfigMapName" . }}
  labels:
    {{- include "fortiaigate.labels" . | nindent 4 }}
{{- if or (gt (len $inline) 0) (gt (len $fileMap) 0) (gt (len $legacy) 0) }}
data:
{{- if or (gt (len $inline) 0) (gt (len $fileMap) 0) }}
{{- range $key, $value := $inline }}
  {{ $key | quote }}: |
{{ $value | indent 4 }}
{{- end }}
{{- range $key, $path := $fileMap }}
  {{ $key | quote }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
{{- else }}
{{- range $key, $path := $legacy }}
  {{ $key | quote }}: |
{{- if $path }}
{{ $.Files.Get $path | indent 4 }}
{{- else }}
{{ "" | indent 4 }}
{{- end }}
{{- end }}
{{- end }}
{{- else }}
data: {}
{{- end }}
{{- end }}
