apiVersion: v1
kind: ConfigMap
metadata:
  name: fortiaigate-license-config
  namespace: fortiaigate
data:
  # One entry per node. Replace the keys with real Kubernetes node names:
  #   kubectl get nodes -o custom-columns=NAME:.metadata.name
  #
  # The full cluster has 3 nodes (2 app + 1 GPU) — each requires its own license.
  ip-10-0-1-10.us-east-1.compute.internal: |
    -----BEGIN FORTIAIGATE LICENSE-----
    REPLACE_WITH_LICENSE_FOR_APP_NODE_1
    -----END FORTIAIGATE LICENSE-----
  ip-10-0-2-20.us-east-1.compute.internal: |
    -----BEGIN FORTIAIGATE LICENSE-----
    REPLACE_WITH_LICENSE_FOR_APP_NODE_2
    -----END FORTIAIGATE LICENSE-----
  ip-10-0-3-30.us-east-1.compute.internal: |
    -----BEGIN FORTIAIGATE LICENSE-----
    REPLACE_WITH_LICENSE_FOR_GPU_NODE
    -----END FORTIAIGATE LICENSE-----
