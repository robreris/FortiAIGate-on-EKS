apiVersion: v1
kind: Secret
metadata:
  name: fortiaigate-external-redis
  namespace: fortiaigate
type: Opaque
stringData:
  redis-password: REPLACE_WITH_ELASTICACHE_AUTH_TOKEN
---
apiVersion: v1
kind: Secret
metadata:
  name: fortiaigate-external-redis-tls
  namespace: fortiaigate
type: Opaque
stringData:
  ca.crt: |
    -----BEGIN CERTIFICATE-----
    REPLACE_WITH_ELASTICACHE_CA_CERTIFICATE
    -----END CERTIFICATE-----
  # Optional if your Redis deployment requires client-certificate auth.
  # tls.crt: |
  #   -----BEGIN CERTIFICATE-----
  #   REPLACE_WITH_CLIENT_CERTIFICATE
  #   -----END CERTIFICATE-----
  # tls.key: |
  #   -----BEGIN PRIVATE KEY-----
  #   REPLACE_WITH_CLIENT_PRIVATE_KEY
  #   -----END PRIVATE KEY-----
