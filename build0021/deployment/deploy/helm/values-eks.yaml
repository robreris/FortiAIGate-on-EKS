tls:
  enabled: true
  existingSecret: fortiaigate-tls-secret

license:
  existingConfigMap: fortiaigate-license-config

postgresql:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/postgresql
    tag: 17.4.0-debian-12-r19
    pullPolicy: IfNotPresent
  auth:
    username: fortiaigate_postgres_user
    database: fortiaigate_db
  tls:
    enabled: true
    certificatesSecret: fortiaigate-tls-secret
    certFilename: tls.crt
    certKeyFilename: tls.key
    preferServerCiphers: true
  # EFS access points enforce directory permissions via directoryPerms/gidRange in
  # the StorageClass. The volumePermissions init container runs chown as root,
  # which EFS squashes — disable it.
  volumePermissions:
    enabled: false
  primary:
    nodeSelector:
      fortiaigate-role: app
    # Explicit affinity prevents the subchart from falling back to the
    # global.licenses hostname affinity, which produces an empty values list.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: fortiaigate-role
                  operator: In
                  values:
                    - app
    persistence:
      enabled: true
      # Clear the chart default shared PVC; PostgreSQL needs its own claim.
      existingClaim: ""
      # efs-sc-stateful has no POSIX UID enforcement so files are owned by
      # the container's actual UID (1001). efs-sc enforces UID 10001 which
      # causes initdb to fail its ownership check.
      storageClass: efs-sc-stateful
      size: 20Gi
      accessModes:
        - ReadWriteOnce

redis:
  enabled: true
  image:
    registry: docker.io
    repository: bitnamilegacy/redis
    tag: 8.2.0-debian-12-r0
    pullPolicy: IfNotPresent
  architecture: standalone
  tls:
    enabled: true
    existingSecret: fortiaigate-tls-secret
    certFilename: tls.crt
    certKeyFilename: tls.key
    certCAFilename: tls.crt
    authClients: false
  master:
    nodeSelector:
      fortiaigate-role: app
    # Explicit affinity prevents the subchart from falling back to the
    # global.licenses hostname affinity, which produces an empty values list.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: fortiaigate-role
                  operator: In
                  values:
                    - app
    persistence:
      enabled: true
      # Clear the chart default shared PVC; Redis needs its own claim.
      existingClaim: ""
      storageClass: efs-sc-stateful
      size: 8Gi
      accessModes:
        - ReadWriteOnce

