apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: REPLACE_CLUSTER_NAME
  region: us-east-1
  version: "1.35"

iam:
  withOIDC: true

managedNodeGroups:
  - name: fortiaigate-app-ng
    amiFamily: AmazonLinux2023
    instanceType: m7i.4xlarge
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 120
    privateNetworking: true
    labels:
      fortiaigate-role: app
    tags:
      Name: fortiaigate-eks-app-ng


addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-efs-csi-driver
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy

# Notes:
# - Single-node layout for a single FortiAIGate license.
# - GPU node group removed; gpu.enabled is false in values-eks.yaml so Triton is not deployed.
# - The app node holds all FortiAIGate CPU services plus bundled PostgreSQL and Redis.
# - The AWS Load Balancer Controller IAM service account is installed after cluster creation; see README.md.
