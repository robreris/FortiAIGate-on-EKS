apiVersion: eksctl.io/v1alpha5
kind: ClusterConfig

metadata:
  name: fortiaigate-eks
  region: us-east-1
  version: "1.35"

iam:
  withOIDC: true

managedNodeGroups:
  - name: fortiaigate-gpu-app-ng
    amiFamily: AmazonLinux2023
    instanceType: g5.4xlarge
    desiredCapacity: 1
    minSize: 1
    maxSize: 1
    volumeSize: 350
    privateNetworking: true
    labels:
      fortiaigate-role: app
      accelerator: nvidia
    tags:
      Name: fortiaigate-eks-gpu-app-ng

addons:
  - name: vpc-cni
  - name: coredns
  - name: kube-proxy
  - name: aws-efs-csi-driver
    attachPolicyARNs:
      - arn:aws:iam::aws:policy/service-role/AmazonEFSCSIDriverPolicy

# Notes:
# - Single-node layout for one FortiAIGate license with Triton/scanners enabled.
# - The node is GPU-backed so Triton can run locally with the rest of the stack.
# - Single node confirmed working with one license entry keyed to the node name.
# - The AWS Load Balancer Controller IAM service account is installed after cluster creation; see README.md.
