apiVersion: apps/v1
kind: Deployment
metadata:
  name: logd
  labels:
    app: logd
    component: logd
    app.kubernetes.io/name: fortiaigate
    app.kubernetes.io/part-of: fortiaigate-platform
    app.kubernetes.io/managed-by: helm
spec:
  replicas: {{ .Values.logd.replicas }}
  strategy:
    type: {{ .Values.fortiaigate.updateStrategy }}
  selector:
    matchLabels:
      app: logd
      component: logd
  template:
    metadata:
      {{- if eq (include "fortiaigate.shouldMountTlsSecret" .) "true" }}
      annotations:
        checksum/tls: {{ include "fortiaigate.tlsChecksum" . }}
      {{- end }}
      labels:
        app: logd
        component: logd
    spec:
      {{- include "fortiaigate.renderPlacement" .Values.fortiaigate.workloadPlacement | nindent 6 }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        fsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: logd
          image: "{{ .Values.fortiaigate.image.repository }}/logd:{{ .Values.fortiaigate.image.tag }}"
          imagePullPolicy: {{ .Values.fortiaigate.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          resources:
            {{- toYaml .Values.logd.resources | nindent 12 }}
          env:
            - name: FORTIAIGATE_LOG_LEVEL
              value: {{ .Values.fortiaigate.env.logLevel | quote }}
            {{- include "fortiaigate.appTlsEnv" . | nindent 12 }}
            {{- include "fortiaigate.redisEnv" . | nindent 12 }}
            {{- include "fortiaigate.postgresEnv" . | nindent 12 }}
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fortiaigate.fullname" . }}-db-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fortiaigate.fullname" . }}-db-config
                  key: REDIS_PORT
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fortiaigate.fullname" . }}-db-config
                  key: POSTGRES_USER
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fortiaigate.fullname" . }}-db-config
                  key: POSTGRES_DB
            - name: POSTGRES_HOST
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fortiaigate.fullname" . }}-db-config
                  key: POSTGRES_HOST
            - name: POSTGRES_PORT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "fortiaigate.fullname" . }}-db-config
                  key: POSTGRES_PORT
            - name: PV_SIZE
              value: {{ .Values.storage.size | quote }}
          volumeMounts:
            - name: shared-data
              mountPath: /etc/fortiaigate/
            - name: tmp
              mountPath: /tmp
            {{- if eq (include "fortiaigate.shouldMountTlsSecret" .) "true" }}
            - name: tls-certs
              mountPath: {{ .Values.tls.mountPath | quote }}
              readOnly: true
            {{- end }}
            {{- include "fortiaigate.externalTlsVolumeMounts" . | nindent 12 }}
      volumes:
        - name: shared-data
          persistentVolumeClaim:
            claimName: {{ include "fortiaigate.storageClaimName" . }}
        - name: tmp
          emptyDir: {}
        {{- if eq (include "fortiaigate.shouldMountTlsSecret" .) "true" }}
        - name: tls-certs
          secret:
            secretName: {{ include "fortiaigate.tlsSecretName" . }}
        {{- end }}
        {{- include "fortiaigate.externalTlsVolumes" . | nindent 8 }}
      {{- with .Values.fortiaigate.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
